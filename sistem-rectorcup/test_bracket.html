<!DOCTYPE html>
<html>
<head>
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery-bracket@0.11.1/dist/jquery.bracket.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery-bracket@0.11.1/dist/jquery.bracket.min.js"></script>
</head>
<body>
    <div id="bracket"></div>
    <script>
        var data = {
            teams: [
                ["Manajemen", "Kedokteran"],
                ["Manajemen", "PBI"],
                ["Biologi", "Filsafat"],
                ["SI", "Desain Produk"],
                ["IF", "Akuntansi"],
                [null, null],
                [null, null],
                [null, null]
            ],
            results: [
                [
                    [45,21], [29,24], [9,28], [66,11], [50,7]
                ],
                [
                    [44,6], [29,56]
                ],
                [
                    [70,38]
                ]
            ]
        };
        try {
            $('#bracket').bracket({ init: data, skipConsolationRound: false });
            console.log("Success");
        } catch (e) {
            console.error(e);
            document.body.innerHTML += "<p style='color:red'>" + e.message + "</p>";
        }
    </script>
</body>
</html>
